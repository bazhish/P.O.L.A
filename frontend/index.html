<!DOCTYPE html>
<html>
<head>
  <title>Polar - Sistema</title>
</head>
<body>

<h1>Registrar Ocorrência</h1>

<input id="student" placeholder="Nome do aluno">
<input id="desc" placeholder="Descrição">
<button onclick="create()">Registrar</button>

<h2>Ocorrências</h2>
<ul id="list"></ul>

<script>
const API = "http://localhost:3000";

// CRIAR
async function create() {
  const student = document.getElementById("student").value;
  const description = document.getElementById("desc").value;

  const res = await fetch(`${API}/occurrences`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ student, description })
  });

  const data = await res.json();

  alert(data.mensagem || "Criado!");

  load();
}

// LISTAR
async function load() {
  const res = await fetch(`${API}/occurrences`);
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  if (!data.dados) return;

  data.dados.forEach(o => {
    const li = document.createElement("li");

    li.innerText = `
      ${o.aluno} - ${o.descricao} (${o.status})
    `;

    list.appendChild(li);
  });
}

// carregar ao abrir
load();
</script>
</body>
</html>
