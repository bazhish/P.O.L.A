</head>
<body>

    <aside class="sidebar">
      <div class="sidebar__brand">
        <svg width="36" height="36" viewBox="0 0 48 48" fill="none"><path d="M24 4L6 12v14c0 11 8 20 18 22 10-2 18-11 18-22V12L24 4z" stroke="white" stroke-width="2"/><path d="M18 22h12M24 16v12" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
        <div><h1>POLAR</h1><small>Sistema de Ocorrências Escolares</small></div>
      </div>
      <nav class="nav" aria-label="Principal">
        <a href="dashboard.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg> Dashboard</a>
        <a href="ocorrencias-lista.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg> Ocorrências</a>
        <a href="alunos.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg> Alunos</a>
        <a class="is-active" href="turmas.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5z"/></svg> Turmas</a>
        <div class="nav__group"><button type="button" class="nav__item nav__group-toggle" aria-expanded="false"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg> Usuários <span class="nav__chev">▾</span></button><div class="nav__sub"><a href="usuarios.html">Gestão de usuários</a></div></div>
        <div class="nav__group"><button type="button" class="nav__item nav__group-toggle" aria-expanded="false"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/></svg> Relatórios <span class="nav__chev">▾</span></button><div class="nav__sub"><a href="#">Por período</a></div></div>
        <div class="nav__group"><button type="button" class="nav__item nav__group-toggle" aria-expanded="false"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg> Configurações <span class="nav__chev">▾</span></button><div class="nav__sub"><a href="#">Geral</a></div></div>
      </nav>
      <div class="sidebar__user"><span class="avatar">P</span><div class="sidebar__user-info"><strong>Professor</strong><span>professor@escola.edu.br</span></div><span>▾</span></div>
    </aside>
    <div class="app-main">
      <header class="topbar topbar--split">
        <a class="back-link" href="turmas.html">← Voltar para turmas</a>
        <div style="display:flex;align-items:center;gap:1rem">
          <button type="button" class="icon-btn" aria-label="Notificações"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/></svg></button>
          <div class="topbar__user"><span class="avatar">P</span> Professor <span>▾</span></div>
        </div>
      </header>
      <main class="content">
        <div class="page-head">
          <h1>Nova Turma</h1>
          <p>Preencha as informações para criar uma nova turma.</p>
        </div>
        <form id="form-nova-turma" class="card form-card">
          <div class="form-grid">
            <div class="field">
              <label for="nome-turma">Nome da turma <span class="required">*</span></label>
              <input id="nome-turma" class="input" type="text" required placeholder="Ex.: 8º Ano A" />
            </div>
            <div class="field">
              <label for="serie">Ano/Série <span class="required">*</span></label>
              <select id="serie" class="input" required><option value="">Selecione</option><option>6º Ano</option><option>7º Ano</option><option selected>8º Ano</option></select>
            </div>
            <div class="field">
              <label for="periodo">Período <span class="required">*</span></label>
              <select id="periodo" class="input" required><option value="">Selecione</option><option selected>Anual</option><option>Semestral</option></select>
            </div>
            <div class="field">
              <label for="turno">Turno <span class="required">*</span></label>
              <select id="turno" class="input" required><option value="">Selecione</option><option selected>Matutino</option><option>Vespertino</option><option>Noturno</option></select>
            </div>
            <div class="field">
              <label for="prof-resp">Professor responsável (opcional)</label>
              <select id="prof-resp" class="input"><option>Selecione um professor</option><option>Professor</option><option>Coordenador</option></select>
            </div>
            <div class="field">
              <label for="ano-letivo">Ano letivo <span class="required">*</span></label>
              <input id="ano-letivo" class="input" type="text" required value="2026" />
            </div>
            <div class="field full">
              <label for="desc-turma">Descrição (opcional)</label>
              <textarea id="desc-turma" class="input" data-max-length="255" placeholder="Informações adicionais sobre a turma..."></textarea>
              <div class="char-count"><span data-char-for="desc-turma">0 / 255 caracteres</span></div>
            </div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn--secondary" data-cancel-href="turmas.html">Cancelar</button>
            <button type="submit" class="btn btn--primary">Salvar turma</button>
          </div>
        </form>
      </main>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
